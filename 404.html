<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Solusi Kitchen Expert</title>
    <script type="text/javascript">
      var pathSegmentToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
